<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ef4444"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="520" fill="#f8fafc" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">消化接力赛模型</text>
  <text x="400" y="52" text-anchor="middle" font-size="13" fill="#94a3b8">任何一站掉棒 → 下一站超负荷 → 全线崩溃</text>

  <!-- Track / timeline -->
  <rect x="50" y="180" width="700" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="50" y="180" width="700" height="6" rx="3" fill="url(#track-grad)" opacity="0.3"/>

  <!-- 起点：口腔 -->
  <rect x="55" y="70" width="120" height="100" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="115" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">起点</text>
  <text x="115" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#d97706">口腔</text>
  <text x="115" y="140" text-anchor="middle" font-size="10" fill="#a16207">机械粉碎</text>
  <text x="115" y="155" text-anchor="middle" font-size="10" fill="#a16207">淀粉酶启动</text>

  <!-- Arrow -->
  <line x1="175" y1="120" x2="210" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 第一棒：胃 -->
  <rect x="215" y="70" width="120" height="100" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="275" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">第一棒</text>
  <text x="275" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">胃</text>
  <text x="275" y="140" text-anchor="middle" font-size="10" fill="#b91c1c">胃酸三大任务</text>
  <text x="275" y="155" text-anchor="middle" font-size="10" fill="#b91c1c">蛋白质启动分解</text>

  <!-- Arrow -->
  <line x1="335" y1="120" x2="370" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 第二棒：十二指肠 -->
  <rect x="375" y="65" width="130" height="110" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e3a5f">第二棒 ⭐</text>
  <text x="440" y="115" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563eb">十二指肠</text>
  <text x="440" y="135" text-anchor="middle" font-size="10" fill="#3b82f6">最高光时刻</text>
  <text x="440" y="150" text-anchor="middle" font-size="10" fill="#3b82f6">胰酶+胆汁会师</text>
  <text x="440" y="165" text-anchor="middle" font-size="10" fill="#60a5fa">碳酸氢盐中和</text>

  <!-- Arrow -->
  <line x1="505" y1="120" x2="540" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 第三棒：空肠回肠 -->
  <rect x="545" y="70" width="120" height="100" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="605" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">第三棒</text>
  <text x="605" y="120" text-anchor="middle" font-size="15" font-weight="bold" fill="#16a34a">空肠+回肠</text>
  <text x="605" y="140" text-anchor="middle" font-size="10" fill="#15803d">营养吸收主战场</text>
  <text x="605" y="155" text-anchor="middle" font-size="10" fill="#15803d">200-250㎡</text>

  <!-- Arrow going down -->
  <line x1="665" y1="170" x2="665" y2="210" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 终点：大肠 -->
  <rect x="545" y="220" width="120" height="90" rx="10" fill="#f0fdf4" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="605" y="250" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">终点</text>
  <text x="605" y="270" text-anchor="middle" font-size="15" font-weight="bold" fill="#ea580c">大肠</text>
  <text x="605" y="290" text-anchor="middle" font-size="10" fill="#c2410c">菌群发酵→SCFA</text>

  <!-- ===== 掉棒后果区 ===== -->
  <rect x="50" y="335" width="700" height="165" rx="10" fill="#fff1f2" stroke="#fecaca" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="70" y="358" font-size="13" font-weight="bold" fill="#dc2626">⚠️ 掉棒连锁反应</text>

  <!-- 口腔掉棒 -->
  <rect x="70" y="370" width="200" height="50" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="170" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">🦷 口腔掉棒</text>
  <text x="170" y="408" text-anchor="middle" font-size="10" fill="#b91c1c">狼吞虎咽→胃被迫加班</text>

  <line x1="270" y1="395" x2="310" y2="395" stroke="#ef4444" stroke-width="1" marker-end="url(#arrow-red)"/>

  <!-- 胃掉棒 -->
  <rect x="315" y="370" width="200" height="50" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="415" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">🫀 胃掉棒</text>
  <text x="415" y="408" text-anchor="middle" font-size="10" fill="#b91c1c">胃酸不足→下游信号中断</text>

  <line x1="515" y1="395" x2="555" y2="395" stroke="#ef4444" stroke-width="1" marker-end="url(#arrow-red)"/>

  <!-- 十二指肠掉棒 -->
  <rect x="560" y="370" width="170" height="50" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="645" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">🧪 十二指肠掉棒</text>
  <text x="645" y="408" text-anchor="middle" font-size="10" fill="#b91c1c">胰酶+胆汁不足→全线卡壳</text>

  <!-- Result -->
  <rect x="200" y="435" width="400" height="45" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="455" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">👇 最终结果</text>
  <text x="400" y="472" text-anchor="middle" font-size="11" fill="#991b1b">未消化食物进入大肠 → 腐败发酵 → 菌群失衡 → 为肠漏铺路</text>
</svg>