<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="420" fill="#f8fafc" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">消化系统三大核心功能</text>
  <text x="400" y="52" text-anchor="middle" font-size="13" fill="#94a3b8">分析客户问题的三把钥匙</text>

  <!-- Center: Digestive system -->
  <rect x="300" y="140" width="200" height="60" rx="30" fill="#4f6ef7" filter="url(#shadow)"/>
  <text x="400" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">消化系统</text>

  <!-- Function 1: 消化吸收 - top left -->
  <rect x="40" y="60" width="220" height="80" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e3a5f">① 消化吸收</text>
  <text x="150" y="110" text-anchor="middle" font-size="11" fill="#2563eb">生产线 | 大众最熟悉的功能</text>
  <text x="150" y="128" text-anchor="middle" font-size="10" fill="#60a5fa">胃酸→胰酶→胆汁→小肠吸收</text>

  <!-- Arrow 1 to center -->
  <line x1="260" y1="130" x2="300" y2="160" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Function 2: 屏障防御 - top right -->
  <rect x="540" y="60" width="220" height="80" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="90" text-anchor="middle" font-size="15" font-weight="bold" fill="#166534">② 屏障防御</text>
  <text x="650" y="110" text-anchor="middle" font-size="11" fill="#15803d">海关 | ❗ 最常被低估</text>
  <text x="650" y="128" text-anchor="middle" font-size="10" fill="#4ade80">70%免疫细胞在肠道</text>

  <!-- Arrow 2 to center -->
  <line x1="540" y1="130" x2="500" y2="160" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Function 3: 菌群调控 - bottom -->
  <rect x="290" y="250" width="220" height="80" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="280" text-anchor="middle" font-size="15" font-weight="bold" fill="#92400e">③ 菌群调控</text>
  <text x="400" y="300" text-anchor="middle" font-size="11" fill="#a16207">合伙人 | 1.5-2kg隐形器官</text>
  <text x="400" y="318" text-anchor="middle" font-size="10" fill="#d97706">100万亿微生物 | 短链脂肪酸</text>

  <!-- Arrow center to 3 -->
  <line x1="400" y1="200" x2="400" y2="250" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Highlight box -->
  <rect x="80" y="355" width="640" height="45" rx="8" fill="#f8fafc" stroke="#4f6ef7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="375" text-anchor="middle" font-size="12" fill="#64748b">💡 三大功能深度交织：消化不好→菌群失衡→屏障下降→全身炎症→慢病爆发</text>
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#94a3b8">分析学员时要同时握三把钥匙——不只是看消化好不好</text>
</svg>