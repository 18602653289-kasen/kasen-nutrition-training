<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kasen Nutrition · 专家助理培训平台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f7fa;color:#1e293b;line-height:1.6;min-height:100vh}
  .container{max-width:560px;margin:0 auto;padding:20px 16px 60px}

  /* Header */
  .header{background:linear-gradient(135deg,#006b4a,#00d68f 55%,#00b37a);color:#fff;padding:32px 24px 24px;border-radius:16px;margin-bottom:20px;position:relative;overflow:hidden}
  .header::before{content:'';position:absolute;top:-25%;right:-10%;width:200px;height:200px;background:rgba(255,255,255,.04);border-radius:50%}
  .header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.25),rgba(255,255,255,0))}
  .header h1{font-size:22px;font-weight:700;position:relative;z-index:1}
  .header .sub{font-size:13px;opacity:.8;margin-top:2px;position:relative;z-index:1}
  .header .count{display:inline-block;background:rgba(255,255,255,.18);padding:3px 12px;border-radius:10px;font-size:12px;margin-top:8px;position:relative;z-index:1;backdrop-filter:blur(4px)}

  /* Section */
  .section-title{font-size:14px;font-weight:700;color:#475569;margin:20px 0 10px;padding-left:4px;display:flex;align-items:center;gap:6px}
  .section-title::before{content:'';display:inline-block;width:3px;height:14px;background:linear-gradient(to bottom,#00d68f,#00b37a);border-radius:2px}

  /* Course card */
  .course-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #e2e8f0;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px}
  .course-card:hover{box-shadow:0 4px 16px rgba(0,214,143,.1);border-color:#b3f0d9;transform:translateY(-1px)}
  .course-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#f0fdf6,#e6faf2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid #b3f0d9}
  .course-info{flex:1;min-width:0}
  .course-info .name{font-weight:600;font-size:15px;color:#0f172a}
  .course-info .desc{font-size:12px;color:#94a3b8;margin-top:1px}
  .course-info .tags{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
  .course-info .tags span{font-size:10px;padding:1px 6px;border-radius:4px;background:#f1f5f9;color:#64748b}
  .course-arrow{color:#cbd5e1;font-size:16px}

  /* Sub-menu */
  .sub-list{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #e2e8f0;margin-bottom:12px}
  .sub-item{display:flex;align-items:center;gap:12px;padding:14px 16px;text-decoration:none;color:#334155;border-bottom:1px solid #f1f5f9;transition:all .15s}
  .sub-item:last-child{border-bottom:none}
  .sub-item:hover{background:#f0fdf6}
  .sub-item .icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .sub-item .icon.green{background:linear-gradient(135deg,#f0fdf6,#e6faf2);border:1px solid #b3f0d9}
  .sub-item .icon.amber{background:#fffbeb;border:1px solid #fde68a}
  .sub-item .icon.blue{background:#f0f5ff;border:1px solid #c7d2fe}
  .sub-item .info{flex:1}
  .sub-item .info .name{font-weight:600;font-size:14px}
  .sub-item .info .desc{font-size:11px;color:#94a3b8;margin-top:1px}
  .sub-item .arrow{color:#cbd5e1}
  .sub-item .badge{font-size:10px;padding:1px 6px;border-radius:4px;background:#e6faf2;color:#006b4a;margin-left:auto}

  /* Back button */
  .back-btn{display:inline-flex;align-items:center;gap:4px;color:#64748b;font-size:13px;margin-bottom:14px;cursor:pointer;transition:color .15s;border:none;background:none;padding:0}
  .back-btn:hover{color:#00d68f}

  /* Page states */
  .page{display:none}
  .page.active{display:block}

  /* Footer */
  .footer{text-align:center;font-size:11px;color:#94a3b8;padding:20px 0 10px;border-top:1px solid #e2e8f0;margin-top:24px}
  .footer strong{color:#00d68f}
</style>
</head>
<body>

<div class="container">
  <!-- ===== Header ===== -->
  <div class="header">
    <h1>📘 Kasen Nutrition</h1>
    <div class="sub">专家助理培训 · 在线学习平台</div>
    <div class="count" id="courseCount">共 2 门课程</div>
  </div>

  <!-- ===== Page: Course List ===== -->
  <div class="page active" id="pageList">
    <div class="section-title">全部课程</div>
    <div id="courseList"></div>

    <div class="footer">Powered by <strong>Kasen Nutrition</strong></div>
  </div>

  <!-- ===== Page: Course Detail ===== -->
  <div class="page" id="pageDetail">
    <button class="back-btn" onclick="showList()">‹ 返回课程列表</button>
    <div id="courseDetail"></div>

    <div class="footer">Powered by <strong>Kasen Nutrition</strong></div>
  </div>
</div>

<script>
// ============================================================
// DATA — 课程列表，后续在此扩充
// ============================================================
const courses = [
  {
    id: "digestive-upper",
    num: "01",
    icon: "🧬",
    name: "消化系统（上）",
    desc: "结构功能与慢病根源",
    tags: ["基础","消化","肠漏"],
    items: [
      { icon: "📖", iconClass: "green", name: "学习手册", desc: "图文课件 + 自测练习", url: "https://18602653289-kasen.github.io/kasen-nutrition-training/%E5%86%85%E9%83%A8%E5%9F%B9%E8%AE%AD/01-%E6%B6%88%E5%8C%96%E7%B3%BB%E7%BB%9F%E4%B8%93%E9%A2%98/%E6%B6%88%E5%8C%96%E7%B3%BB%E7%BB%9F%EF%BC%88%E4%B8%8A%EF%BC%89%E2%80%94%20%E7%BB%93%E6%9E%84%E5%8A%9F%E8%83%BD%E4%B8%8E%E6%85%A2%E7%97%85%E6%A0%B9%E6%BA%90.html" },
      { icon: "📝", iconClass: "amber", name: "综合考试", desc: "60分钟闭卷 · 在线作答", url: "https://18602653289-kasen.github.io/kasen-nutrition-training/%E5%86%85%E9%83%A8%E5%9F%B9%E8%AE%AD/01-%E6%B6%88%E5%8C%96%E7%B3%BB%E7%BB%9F%E4%B8%93%E9%A2%98/%E8%80%83%E8%AF%95/%E7%BB%BC%E5%90%88%E8%80%83%E8%AF%95.html" },
      { icon: "🃏", iconClass: "blue", name: "学习卡", desc: "速记卡片 · 查看大图", url: "https://18602653289-kasen.github.io/kasen-nutrition-training/%E5%86%85%E9%83%A8%E5%9F%B9%E8%AE%AD/01-%E6%B6%88%E5%8C%96%E7%B3%BB%E7%BB%9F%E4%B8%93%E9%A2%98/%E5%AD%A6%E4%B9%A0%E5%8D%A1/" },
    ]
  },
  {
    id: "nutrition-std",
    num: "02",
    icon: "📋",
    name: "营养中心作业标准（上）",
    desc: "接待前准备",
    tags: ["标准","作业","接待"],
    items: [
      { icon: "📖", iconClass: "green", name: "学习手册", desc: "图文课件 + 自测练习", url: "https://18602653289-kasen.github.io/kasen-nutrition-training/%E5%86%85%E9%83%A8%E5%9F%B9%E8%AE%AD/%E8%90%A5%E5%85%BB%E4%B8%AD%E5%BF%83%E4%BD%9C%E4%B8%9A%E6%A0%87%E5%87%86/%E5%AD%A6%E4%B9%A0%E6%89%8B%E5%86%8C.html" },
      { icon: "📝", iconClass: "amber", name: "综合考试", desc: "60分钟闭卷", url: "https://18602653289-kasen.github.io/kasen-nutrition-training/%E5%86%85%E9%83%A8%E5%9F%B9%E8%AE%AD/%E8%90%A5%E5%85%BB%E4%B8%AD%E5%BF%83%E4%BD%9C%E4%B8%9A%E6%A0%87%E5%87%86/%E8%80%83%E8%AF%95/%E7%BB%BC%E5%90%88%E8%80%83%E8%AF%95.html" },
      { icon: "📋", iconClass: "green", name: "课程大纲", desc: "知识框架", url: "https://18602653289-kasen.github.io/kasen-nutrition-training/%E5%86%85%E9%83%A8%E5%9F%B9%E8%AE%AD/%E8%90%A5%E5%85%BB%E4%B8%AD%E5%BF%83%E4%BD%9C%E4%B8%9A%E6%A0%87%E5%87%86/%E5%A4%A7%E7%BA%B2/" }
    ]
  }
];

// ============================================================
// RENDER
// ============================================================
function renderList() {
  const container = document.getElementById('courseList');
  const count = document.getElementById('courseCount');
  count.textContent = `共 ${courses.length} 门课程`;

  container.innerHTML = courses.map((c, i) => `
    <div class="course-card" onclick="showDetail(${i})">
      <div class="course-icon">${c.icon}</div>
      <div class="course-info">
        <div class="name">${c.num} · ${c.name}</div>
        <div class="desc">${c.desc}</div>
        <div class="tags">${c.tags.map(t => `<span>${t}</span>`).join('')}</div>
      </div>
      <div class="course-arrow">›</div>
    </div>
  `).join('');
}

function showDetail(idx) {
  const c = courses[idx];
  const container = document.getElementById('courseDetail');
  // Push browser history so back button returns to this view
  history.pushState({courseIdx: idx}, '', '#' + c.id);

  document.getElementById('pageList').classList.remove('active');
  document.getElementById('pageDetail').classList.add('active');

  container.innerHTML = `
    <div class="header" style="margin-bottom:16px">
      <h1>${c.icon} ${c.name}</h1>
      <div class="sub">${c.desc}</div>
    </div>

    <div class="section-title">课程资源</div>
    <div class="sub-list">
      ${c.items.map(item => `
        <a class="sub-item" href="${item.url}" target="_blank">
          <div class="icon ${item.iconClass}">${item.icon}</div>
          <div class="info">
            <div class="name">${item.name}</div>
            <div class="desc">${item.desc}</div>
          </div>
          ${item.badge ? `<span class="badge">${item.badge}</span>` : ''}
          <div class="arrow">›</div>
        </a>
      `).join('')}
    </div>
  `;
}

function showList() {
  document.getElementById('pageList').classList.add('active');
  document.getElementById('pageDetail').classList.remove('active');
}

// ============================================================
// INIT
// ============================================================
renderList();

// Check URL hash for deep linking
function checkHash() {
  const hash = window.location.hash.replace('#', '');
  if (hash) {
    const idx = courses.findIndex(c => c.id === hash);
    if (idx >= 0) showDetail(idx);
  }
}
checkHash();
window.addEventListener('hashchange', checkHash);
window.addEventListener('popstate', function(e) {
  if (e.state && e.state.courseIdx !== undefined) {
    showDetail(e.state.courseIdx);
  } else {
    showList();
  }
});
</script>

</body>
</html>
