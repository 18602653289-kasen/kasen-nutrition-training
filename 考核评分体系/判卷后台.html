<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>判卷后台 · Kasen Nutrition</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f7fa;color:#0f172a;line-height:1.6}
  .container{max-width:960px;margin:0 auto;padding:16px 16px 60px}

  /* Header */
  .header{background:linear-gradient(135deg,#006b4a,#00d68f 55%,#00b37a);color:#fff;padding:24px 24px 20px;border-radius:16px;margin-bottom:20px;position:relative;overflow:hidden}
  .header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.25) 50%,rgba(255,255,255,0))}
  .header::before{content:'';position:absolute;top:-30%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.04);border-radius:50%}.header h1{font-size:22px;font-weight:700;position:relative;z-index:1}
  .header .sub{font-size:13px;opacity:.7;margin-top:2px;position:relative;z-index:1}
  .header .meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;position:relative;z-index:1}
  .header .meta span{background:rgba(255,255,255,.18);color:#fff;padding:2px 10px;border-radius:8px;font-size:12px;font-weight:500;backdrop-filter:blur(4px)}

  /* Card */
  .card{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid #e2e8f0}
  .card-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid #f1f5f9}
  .card-title .badge{background:linear-gradient(135deg,#00d68f,#00b37a);color:#fff;font-size:11px;padding:1px 8px;border-radius:6px;font-weight:500;margin-left:auto}

  /* Form elements */
  .form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
  .form-row label{font-size:13px;font-weight:600;color:#475569;min-width:70px}
  .form-row select,.form-row input[type="text"],.form-row input[type="number"]{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;flex:1;min-width:120px;background:#fff;color:#0f172a}
  .form-row select:focus,.form-row input:focus{border-color:#00d68f;box-shadow:0 0 0 3px rgba(0,214,143,.1)}
  .form-row select{appearance:auto}

  /* Button */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 20px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;text-decoration:none}
  .btn-dark{background:linear-gradient(135deg,#00d68f,#00b37a);color:#fff;box-shadow:0 2px 8px rgba(0,214,143,.2)}
  .btn-dark:hover{background:linear-gradient(135deg,#00b37a,#009966);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,214,143,.35)}
  .btn-green{background:linear-gradient(135deg,#00d68f,#00b37a);color:#fff;box-shadow:0 2px 8px rgba(0,214,143,.2)}
  .btn-green:hover{background:linear-gradient(135deg,#00b37a,#009966);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,214,143,.4)}
  .btn-outline{background:#fff;color:#475569;border:1px solid #e2e8f0}
  .btn-outline:hover{background:#f8fafc;border-color:#00d68f;color:#0f172a}
  .btn-sm{padding:5px 12px;font-size:12px}
  .btn-danger{background:#ef4444;color:#fff}
  .btn-danger:hover{background:#dc2626}

  /* Question list */
  .question-block{margin-bottom:14px;padding:14px;background:#f8fafc;border-radius:10px;border:1px solid #e2e8f0}
  .question-block .q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
  .question-block .q-header .q-num{font-weight:700;color:#006b4a;font-size:14px}
  .question-block .q-header .q-score{font-size:12px;color:#64748b}
  .question-block .q-text{font-size:14px;margin-bottom:8px;color:#1e293b}
  .question-block .q-answer{font-size:13px;color:#475569;margin-bottom:6px}
  .question-block .q-answer .correct{color:#10b981;font-weight:600}
  .question-block .q-answer .wrong{color:#ef4444;font-weight:600}
  .question-block .q-answer .partial{color:#f59e0b;font-weight:600}

  /* MCQ grading */
  .mcq-options{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0}
  .mcq-options .opt{padding:4px 10px;border-radius:6px;font-size:13px;border:1px solid #e2e8f0;background:#fff}
  .mcq-options .opt.selected{border-color:#00d68f;background:#f0fdf6}
  .mcq-options .opt.correct{border-color:#10b981;background:#ecfdf5}
  .mcq-options .opt.wrong{border-color:#ef4444;background:#fef2f2}

  /* Subjective keyword check */
  .keyword-row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
  .kw-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:500;background:#f1f5f9;border:1px solid #e2e8f0;cursor:pointer;transition:all .15s}
  .kw-tag:hover{border-color:#00d68f}
  .kw-tag.hit{background:#ecfdf5;border-color:#10b981;color:#065f46}
  .kw-tag.miss{background:#fef2f2;border-color:#fecaca;color:#991b1b}
  .kw-tag .kw-score{font-size:10px;color:#94a3b8;margin-left:2px}

  /* Score result */
  .result-bar{display:flex;gap:16px;padding:16px;border-radius:10px;margin:14px 0;align-items:center;flex-wrap:wrap}
  .result-bar.pass{background:#ecfdf5;border:1px solid #a7f3d0}
  .result-bar.fail{background:#fef2f2;border:1px solid #fecaca}
  .result-bar.resit{background:#fffbeb;border:1px solid #fde68a}
  .result-bar .score-num{font-size:36px;font-weight:800;background:linear-gradient(135deg,#00d68f,#00b37a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .result-bar .score-label{font-size:14px;}
  .result-bar .status-tag{padding:4px 14px;border-radius:8px;font-size:14px;font-weight:700}
  .result-bar .status-tag.pass{background:#10b981;color:#fff}
  .result-bar .status-tag.fail{background:#ef4444;color:#fff}
  .result-bar .status-tag.resit{background:#f59e0b;color:#fff}

  /* Tab nav */
  .tab-nav{display:flex;gap:4px;margin-bottom:14px;border-bottom:2px solid #e2e8f0}
  .tab-btn{padding:8px 16px;border:none;background:none;font-size:14px;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
  .tab-btn:hover{color:#475569}
  .tab-btn.active{color:#006b4a;border-bottom-color:#00d68f;font-weight:700}

  /* Table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#f1f5f9;padding:8px 10px;text-align:left;font-weight:600;border:1px solid #e2e8f0;color:#0f172a}
  td{padding:8px 10px;border:1px solid #e2e8f0}
  tr:nth-child(even){background:#f8fafc}

  /* Responsive */
  @media(max-width:600px){
    .form-row{flex-direction:column;align-items:stretch}
    .result-bar{flex-direction:column;text-align:center}
    .tab-btn{font-size:12px;padding:6px 10px}
  }

  /* Tag input */
  .tag-input-wrap{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .tag-input-wrap input{flex:1;min-width:100px}

  /* Section hide/show */
  .tab-content{display:none}
  .tab-content.active{display:block}

  .step-indicator{display:flex;gap:8px;margin-bottom:16px}
  .step{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:12px;font-weight:600;background:#f1f5f9;color:#94a3b8}
  .step.active{background:#0a1628;color:#fff}
  .step.done{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}

  .divider{border:none;border-top:1px solid #e2e8f0;margin:16px 0}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>📊 判卷后台</h1>
    <div class="sub">建美元素 · 专家助理培训考核系统</div>
    <div class="meta">
      <span>⚡ 客观题自动判卷</span>
      <span>🔍 主观题关键词辅助</span>
      <span>📋 三级考核标准</span>
    </div>
  </div>

  <!-- Step Indicator -->
  <div class="step-indicator" id="stepIndicator">
    <div class="step active" id="s1">① 考试配置</div>
    <div class="step" id="s2">② 答案录入</div>
    <div class="step" id="s3">③ 判卷评分</div>
    <div class="step" id="s4">④ 结果输出</div>
  </div>

  <!-- ==================== STEP 1: 考试配置 ==================== -->
  <div class="card" id="step1Card">
    <div class="card-title">⚙️ 考试配置 <span class="badge">Step 1</span></div>

    <div class="form-row">
      <label>考试类型</label>
      <select id="examType" onchange="updatePassLine()">
        <option value="daily">📅 每日考核（通过≥60）</option>
        <option value="weekly">📆 每周考核（通过≥70）</option>
        <option value="monthly">📅 每月考核（通过≥80）</option>
      </select>
    </div>

    <div class="form-row">
      <label>考试专题</label>
      <select id="examTopic">
        <option value="digestive-upper">消化系统（上）— 结构功能与慢病根源</option>
        <option value="digestive-lower">消化系统（下）</option>
        <option value="liver">肝病</option>
        <option value="diabetes-upper">糖尿病（上）</option>
        <option value="diabetes-lower">糖尿病（下）</option>
        <option value="hypertension-upper">高血压（上）</option>
        <option value="hypertension-lower">高血压（下）</option>
        <option value="blood-fat">高血脂/动脉硬化</option>
        <option value="uric-acid">高尿酸/痛风</option>
        <option value="autoimmune">自身免疫病</option>
        <option value="nodules">结节囊肿</option>
        <option value="insomnia">失眠+肌少症</option>
        <option value="kidney">肾病</option>
        <option value="integration">五大系统整合</option>
        <option value="final">专业终考</option>
      </select>
    </div>

    <div class="form-row">
      <label>学员姓名</label>
      <input type="text" id="studentName" placeholder="输入学员姓名" value="徐楚炎">
    </div>

    <div class="form-row">
      <label>及格线</label>
      <span id="passLine" style="font-weight:700;color:#00d68f;font-size:18px">60</span>
      <span style="font-size:12px;color:#94a3b8">分 · 补考区间: <span id="resitRange">40-59</span>分 · 淘汰线: ＜<span id="elimLine">40</span></span>
    </div>

    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-dark" onclick="goToStep(2)">下一步 → 录入答案</button>
      <button class="btn btn-outline btn-sm" onclick="loadSampleData()">📥 加载样例数据</button>
    </div>
  </div>

  <!-- ==================== STEP 2: 答案录入 ==================== -->
  <div class="card" id="step2Card" style="display:none">
    <div class="card-title">📝 答案录入 <span class="badge">Step 2</span></div>

    <!-- Tab: 客观题 -->
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('mcq',this)">📝 选择题</button>
      <button class="tab-btn" onclick="switchTab('fill',this)">✏️ 填空题</button>
      <button class="tab-btn" onclick="switchTab('short',this)">📋 简答题</button>
      <button class="tab-btn" onclick="switchTab('case',this)">🏥 案例分析</button>
    </div>

    <!-- MCQ Tab -->
    <div class="tab-content active" id="tabMcq">
      <div id="mcqAnswers"></div>
    </div>

    <!-- Fill Tab -->
    <div class="tab-content" id="tabFill">
      <div id="fillAnswers"></div>
    </div>

    <!-- Short Answer Tab -->
    <div class="tab-content" id="tabShort">
      <div id="shortAnswers"></div>
    </div>

    <!-- Case Tab -->
    <div class="tab-content" id="tabCase">
      <div id="caseAnswers"></div>
    </div>

    <hr class="divider">

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-green" onclick="gradeAll()">⚡ 开始判卷</button>
      <button class="btn btn-outline" onclick="goToStep(1)">← 返回配置</button>
    </div>
  </div>

  <!-- ==================== STEP 3: 判卷评分 ==================== -->
  <div class="card" id="step3Card" style="display:none">
    <div class="card-title">📊 判卷评分 <span class="badge">Step 3</span></div>

    <div id="gradingResults"></div>

    <hr class="divider">

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-dark" onclick="goToStep(4)" id="toResultBtn" disabled>下一步 → 结果报告</button>
      <button class="btn btn-outline" onclick="goToStep(2)">← 返回修改答案</button>
    </div>
  </div>

  <!-- ==================== STEP 4: 结果输出 ==================== -->
  <div class="card" id="step4Card" style="display:none">
    <div class="card-title">📋 成绩报告 <span class="badge">Step 4</span></div>

    <div id="resultContent"></div>

    <hr class="divider">

    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-dark" onclick="printResult()">🖨️ 打印报告</button>
      <button class="btn btn-green" onclick="copyResult()">📋 复制成绩</button>
      <button class="btn btn-outline" onclick="newGrading()">🔄 重新判卷</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// ANSWER KEY — 以消化系统（上）综合考试为标准
// ============================================================
const ANSWER_KEY = {
  // 20 MCQs
  mcq: [
    { answer: 0, text: "A" },  // B. 消化吸收、屏障防御、菌群调控
    { answer: 1, text: "B" },  // B. 口腔→食管→胃→小肠→大肠
    { answer: 2, text: "C" },  // C. 胰腺
    { answer: 1, text: "B" },  // B. 保护胃自身不被消化
    { answer: 2, text: "C" },  // C. 可能导致SIBO
    { answer: 2, text: "C" },  // C. 大便粘腻浮水
    { answer: 0, text: "A" },  // A. 一吃油腻就腹胀
    { answer: 1, text: "B" },  // B. 长期不吃早餐
    { answer: 1, text: "B" },  // B. 失去浓缩和定时
    { answer: 1, text: "B" },  // B. 被过度激活
    { answer: 1, text: "B" },  // B. 黏液层
    { answer: 2, text: "C" },  // C. 麸质
    { answer: 2, text: "C" },  // C. 阴燃暗火
    { answer: 1, text: "B" },  // B. 促进胰岛素分泌
    { answer: 2, text: "C" },  // C. 肠道
    { answer: 3, text: "D" },  // D. 约95%
    { answer: 0, text: "A" },  // A. 废弃雌激素重吸收
    { answer: 2, text: "C" },  // C. 修复黏膜
    { answer: 1, text: "B" },  // B. 按结果排优先级
    { answer: 1, text: "B" },  // B. 拿掉阻碍+给足原料
  ],
  // Fill-in (by questions)
  fill: [
    { answers: ["口腔","食管","胃","小肠","大肠"], keywords: ["口腔","食管","胃","小肠","大肠"] },
    { answers: ["肝脏","胆囊","胰腺"], keywords: ["肝脏","胆囊","胰腺"] },
    { answers: ["黏液层","紧密连接","分泌型IgA"], keywords: ["黏液","紧密连接","分泌型IgA","IgA"] },
    { answers: ["抑酸药","幽门螺杆菌"], keywords: ["抑酸","PPI","奥美拉唑","幽门螺杆菌"] },
  ],
  // Short answer keywords
  short: [
    {
      title: "1、胃酸的三大任务",

  case: [
    {
      title: "案例一（反酸烧心）",

          id: "c1q1",

    {

        {

          keywords: [

            { word: "失去浓缩/定时释放", score: 2 },

function gradeAll() {
  let totalScore = 0;
  let details = [];

  // Grade MCQs
  let mcqCorrect = 0;
  for (let i = 0; i < 20; i++) {
    const sel = document.getElementById(`mcq_${i}`);
    if (sel) {
      const val = sel.value;
      const isCorrect = val !== '' && parseInt(val) === ANSWER_KEY.mcq[i].answer;
      if (isCorrect) mcqCorrect++;
      details.push({
        type: 'mcq',
        num: i+1,
        text: `第${i+1}题`,
        correct: isCorrect,
        score: isCorrect ? 1 : 0,
        max: 1,
        studentAnswer: val !== '' ? ['A','B','C','D'][parseInt(val)] : '未作答',
        correctAnswer: ANSWER_KEY.mcq[i].text
      });
    }
  }
  const mcqScore = mcqCorrect; // 每题1分
  totalScore += mcqScore;

  // Grade Fill-ins (partial match)
  let fillScore = 0;
  let fillTotal = 0;
  for (let qi = 0; qi < ANSWER_KEY.fill.length; qi++) {
    const q = ANSWER_KEY.fill[qi];
    q.keywords.forEach((kw, ki) => {
      const input = document.getElementById(`fill_${qi}_${ki}`);
      fillTotal++;
      if (input) {
        const val = input.value.trim();
        let matched = false;
        // Check if any keyword matches
        for (let w of q.keywords) {
          if (val.includes(w.slice(0,2)) || w.includes(val)) {
            matched = true;
            break;
          }
        }
        if (matched) fillScore++;
        details.push({
          type: 'fill', section: qi+1, slot: ki+1,
          text: `填空题${qi+1}·空${ki+1}`,
          correct: matched,
          score: matched ? 2 : 0,
          max: 2,
          studentAnswer: val || '空',
          correctAnswer: q.answers[ki] || ''
        });
      }
    });
  }
  totalScore += fillScore * 2;

  // Grade Short Answers (keyword matching)
  let shortScore = 0;
  for (let qi = 0; qi < ANSWER_KEY.short.length; qi++) {
    const q = ANSWER_KEY.short[qi];
    const textarea = document.getElementById(`short_${qi}`);
    const text = textarea ? textarea.value.trim() : '';
    let qScore = 0;
    const kwResults = [];

    q.keywords.forEach(kw => {
      const synonyms = q.synonyms[kw.word] || [kw.word];
      let matched = false;
      for (let syn of synonyms) {
        if (text.includes(syn)) { matched = true; break; }
      }
      if (matched) qScore += kw.score;
      kwResults.push({ word: kw.word, matched, score: matched ? kw.score : 0, max: kw.score });
    });

    qScore = Math.round(qScore * 10) / 10;
    shortScore += qScore;
    details.push({
      type: 'short', num: qi+1,
      text: q.title,
      score: qScore,
      max: 5,
      keywords: kwResults,
      studentAnswer: text.substring(0, 80) + (text.length > 80 ? '...' : '')
    });
  }
  totalScore += shortScore;

  // Grade Case Studies (keyword matching)
  let caseScore = 0;
  for (let ci = 0; ci < ANSWER_KEY.case.length; ci++) {
    const c = ANSWER_KEY.case[ci];
    let cScore = 0;
    const subResults = [];

    c.subs.forEach((s, si) => {
      const textarea = document.getElementById(`case_${ci}_${si}`);
      const text = textarea ? textarea.value.trim() : '';
      let sScore = 0;
      const kwResults = [];

      s.keywords.forEach(kw => {
        const synonyms = s.synonyms[kw.word] || [kw.word];
        let matched = false;
        for (let syn of synonyms) {
          if (text.includes(syn)) { matched = true; break; }
        }
        if (matched) sScore += kw.score;
        kwResults.push({ word: kw.word, matched, score: matched ? kw.score : 0, max: kw.score });
      });

      sScore = Math.round(sScore * 10) / 10;
      cScore += sScore;
      subResults.push({
        q: s.q,
        score: sScore,
        max: s.keywords.reduce((sum, k) => sum + k.score, 0),
        keywords: kwResults,
        studentAnswer: text.substring(0, 60) + (text.length > 60 ? '...' : '')
      });
    });

    caseScore += cScore;
    details.push({
      type: 'case', num: ci+1,
      text: c.title,
      score: cScore,
      max: 20,
      subs: subResults
    });
  }
  totalScore += caseScore;
  totalScore = Math.round(totalScore * 10) / 10;

  // Determine result
  const examType = document.getElementById('examType').value;
  const passes = { daily: { pass: 60, resitLow: 40, resitHigh: 59, elim: 40 }, weekly: { pass: 70, resitLow: 50, resitHigh: 69, elim: 50 }, monthly: { pass: 80, resitLow: 60, resitHigh: 79, elim: 60 } };
  const p = passes[examType];

  let status, statusText, statusClass;
  if (totalScore >= p.pass) {
    status = 'pass';
    statusText = '✅ 通过';
    statusClass = 'pass';
  } else if (totalScore >= p.elim) {
    status = 'resit';
    statusText = '🔄 补考';
    statusClass = 'resit';
  } else {
    status = 'fail';
    statusText = '❌ 淘汰';
    statusClass = 'fail';
  }

  gradingResults = {
    studentName: document.getElementById('studentName').value,
    examType: examType,
    examTopic: document.getElementById('examTopic').selectedOptions[0].text,
    totalScore: totalScore,
    mcqScore: mcqScore, mcqTotal: 20,
    fillScore: fillScore * 2, fillTotal: fillTotal * 2,
    shortScore: shortScore, shortTotal: 20,
    caseScore: caseScore, caseTotal: 40,
    status, statusText, statusClass,
    passLine: p.pass,
    details
  };

  // Enable next step
  document.getElementById('toResultBtn').disabled = false;

  renderGradingResults();
}

    <div style="padding:20px;border:2px solid ${r.status === 'pass' ? '#10b981' : r.status === 'resit' ? '#f59e0b' : '#ef4444'};border-radius:12px;text-align:center;margin-bottom:16px">

      <div style="font-size:28px;font-weight:800;margin:8px 0;color:#0a1628">${r.totalScore} 分</div>
      <div style="font-size:16px;font-weight:600;color:${r.status === 'pass' ? '#10b981' : r.status === 'resit' ? '#f59e0b' : '#ef4444'};margin-bottom:4px">${r.statusText}</div>
    </div>

    <table style="margin-bottom:16px">
      <tr><th style="width:120px">项目</th><th>内容</th></tr>
      <tr><td>学员姓名</td><td><strong>${r.studentName}</strong></td></tr>
      <tr><td>考试类型</td><td>${examTypeNames[r.examType] || r.examType}</td></tr>
      <tr><td>考试专题</td><td>${r.examTopic}</td></tr>
      <tr><td>及格线</td><td>${r.passLine} 分</td></tr>
      <tr><td>客观题得分</td><td>${r.mcqScore + r.fillScore} / ${r.mcqTotal + r.fillTotal} 分</td></tr>
      <tr><td>主观题得分</td><td>${r.shortScore + r.caseScore} / ${r.shortTotal + r.caseTotal} 分</td></tr>
      <tr style="font-weight:700;background:#f8fafc"><td>最终判定</td><td style="color:${r.status === 'pass' ? '#10b981' : r.status === 'resit' ? '#f59e0b' : '#ef4444'}">${r.statusText}</td></tr>
    </table>

    <div style="font-size:12px;color:#94a3b8;text-align:center">
      判卷时间: ${new Date().toLocaleString('zh-CN')} · Kasen Nutrition 考核评分系统
    </div>
  `;
}

function printResult() {
  window.print();
}

function copyResult() {
  const r = gradingResults;
  if (!r) return;
  const examTypeNames = { daily: '每日考核', weekly: '每周考核', monthly: '每月考核' };
  const text = `═══ Kasen Nutrition 判卷结果 ═══
学员: ${r.studentName}
考试: ${examTypeNames[r.examType]} · ${r.examTopic}
总分: ${r.totalScore}/100
客观题: ${r.mcqScore + r.fillScore}/${r.mcqTotal + r.fillTotal}
主观题: ${r.shortScore + r.caseScore}/${r.shortTotal + r.caseTotal}
判定: ${r.statusText}
判卷时间: ${new Date().toLocaleString('zh-CN')}`;

  navigator.clipboard.writeText(text).then(() => {
    alert('✅ 成绩已复制到剪贴板');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('✅ 成绩已复制');
  });
}

function newGrading() {
  if (!confirm('确定重新判卷？当前结果将丢失。')) return;
  gradingResults = null;
  currentStep = 1;
  document.querySelectorAll('.card[id^="step"]').forEach(c => c.style.display = 'none');
  document.querySelectorAll('.step').forEach(s => s.className = 'step');
  document.getElementById('step1Card').style.display = 'block';
  document.getElementById('s1').className = 'step active';
  document.getElementById('toResultBtn').disabled = true;
  window.scrollTo(0,0);
}
